server:
  port: 8080

spring:
  application:
    name: AliAgent
  config:
    import: optional:classpath:api-keys.yaml
  ai:
    dashscope:
      chat:
        options:
          model: qwen-plus
      embedding:
        enabled: true
        options:
          model: text-embedding-v3
          dimensions: 1024
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        initialize-schema: false
        table-name: document_chunk
        remove-existing-vector-store-table: false
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6600
      password: 123456
      database: 0
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 远程读取默认关闭；仅白名单租户在网关注入可信上下文后可以启用。
feature:
  conversation:
    # 默认保留旧 /api/chat/**；只有网关认证的白名单租户可切换远程会话写入。
    remote-write: false
    remote-write-tenants: ""
    default-tenant: ""
  knowledge:
    remote-read: false
    remote-read-tenants: ""
    remote-read-dual-run: false

knowledge-service:
  base-url: ${KNOWLEDGE_SERVICE_BASE_URL:http://localhost:8084}
  remote-read-timeout: ${KNOWLEDGE_SERVICE_REMOTE_READ_TIMEOUT:2s}
