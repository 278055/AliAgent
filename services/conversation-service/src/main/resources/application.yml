spring:
  application:
    name: conversation-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  flyway:
    enabled: false
management:
  endpoints:
    web:
      exposure:
        include: health
nacos:
  discovery:
    server-addr: ${NACOS_SERVER_ADDR:}
logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-} tenantId=%X{tenantId:-} service=conversation-service]"
conversation:
  outbox:
    dispatch-delay: ${CONVERSATION_OUTBOX_DISPATCH_DELAY:5000}
  remote-write: ${FEATURE_CONVERSATION_REMOTE_WRITE:false}
  orchestration:
    remote-reply: ${FEATURE_ORCHESTRATION_REMOTE_REPLY:false}
