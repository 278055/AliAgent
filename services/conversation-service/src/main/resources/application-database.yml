spring:
  config:
    activate:
      on-profile: database
  autoconfigure:
    exclude: []
  datasource:
    url: ${CONVERSATION_DB_URL}
    username: ${CONVERSATION_DB_USERNAME}
    password: ${CONVERSATION_DB_PASSWORD}
  flyway:
    enabled: true
  rabbitmq:
    host: ${CONVERSATION_RABBITMQ_HOST:localhost}
    port: ${CONVERSATION_RABBITMQ_PORT:5672}
    username: ${CONVERSATION_RABBITMQ_USERNAME:guest}
    password: ${CONVERSATION_RABBITMQ_PASSWORD:guest}
