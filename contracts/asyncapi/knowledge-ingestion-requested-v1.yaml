asyncapi: 3.0.0
info: {title: Knowledge Ingestion Requested, version: 1.0.0}
channels:
  knowledge.ingestion.v1:
    address: knowledge.ingestion.v1
    messages:
      IngestionRequested:
        payload:
          type: object
          required: [eventId, eventVersion, tenantId, traceId, taskId]
          properties:
            eventId: {type: string, format: uuid}
            eventVersion: {const: 1}
            tenantId: {type: string}
            traceId: {type: string}
            taskId: {type: string, format: uuid}
