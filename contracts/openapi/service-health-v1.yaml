openapi: 3.1.0
info:
  title: AliAgent Internal Service Health API
  version: 1.0.0
paths:
  /api/v1/internal/health:
    get:
      operationId: serviceHealth
      summary: Minimum cross-service health endpoint
      parameters:
        - $ref: '#/components/parameters/ServiceAuthorization'
      responses:
        '200':
          description: Service is available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Missing or invalid service JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    ServiceAuthorization:
      name: X-Service-Authorization
      in: header
      required: true
      schema:
        type: string
  schemas:
    SuccessResponse:
      type: object
      required: [code, message, data]
      properties:
        code:
          const: 200
        message:
          type: string
        data:
          type: object
          required: [status]
          properties:
            status:
              const: UP
    ErrorResponse:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          const: AUTH-401-001
        message:
          type: string
        requestId:
          type: string
