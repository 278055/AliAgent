openapi: 3.1.0
info:
  title: AliAgent Gateway Health API
  version: 1.0.0
paths:
  /api/v1/health:
    get:
      operationId: gatewayHealth
      summary: Gateway health route
      responses:
        '200':
          description: Gateway is available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
components:
  schemas:
    SuccessResponse:
      type: object
      required: [code, message, data]
      properties:
        code:
          const: 200
        message:
          type: string
        data:
          type: object
          required: [status]
          properties:
            status:
              const: UP
